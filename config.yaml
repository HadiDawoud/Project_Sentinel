classification:
  labels:
    0: Non-Radical
    1: Mildly Radical
    2: Moderately Radical
    3: Highly Radical
  confidence_threshold: 0.5

rule_engine:
  data_path: data/rules/keywords.yaml
  weights:
    high_risk: 0.8
    medium_risk: 0.5
    low_risk: 0.2
  amplification_factor: 1.5

model:
  name: distilbert-base-uncased
  num_labels: 4
  checkpoint_path: models/checkpoints
  max_length: 256
  batch_size: 16
  learning_rate: 2e-5
  epochs: 3
  warmup_steps: 500
  weight_decay: 0.01

pipeline:
  enable_rule_engine: true
  enable_ml: true
  fusion_method: weighted_average
  # LRU max keys for identical classify() inputs; 0 disables caching.
  classify_cache_size: 0
  # Include wall-clock latency (ms) on classify output when true.
  include_latency_ms: false
  # Lazy load ML model on first use instead of at startup.
  lazy_load_model: false
  # Max workers for parallel batch processing.
  batch_max_workers: 4
  # Chunk size for chunked batch processing.
  batch_chunk_size: 8
  # Cache TTL in seconds.
  cache_ttl_seconds: 300

fusion:
  rule_weight: 0.3
  ml_weight: 0.7
  amplification_factor: 1.5

classification_labels:
  non_radical_threshold: 20
  mildly_radical_threshold: 40
  moderately_radical_threshold: 70

logging:
  level: INFO
  file: logs/sentinel.log
  console: true
  audit_file: logs/audit.log
  audit_enabled: true

api:
  host: 0.0.0.0
  port: 8000
  rate_limit: 60
  rate_limit_batch: 30
